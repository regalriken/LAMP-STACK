<VirtualHost *:80>
    ServerName 192.168.202.128
    DocumentRoot /var/www/lampapp/public
 
    <Directory /var/www/lampapp/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
 
    ErrorLog  ${APACHE_LOG_DIR}/lampapp_error.log
    CustomLog ${APACHE_LOG_DIR}/lampapp_access.log combined
</VirtualHost>
